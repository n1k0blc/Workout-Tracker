version: '3.8'

services:
  # PostgreSQL Database (Production)
  postgres:
    image: postgres:16-alpine
    container_name: workout-tracker-db-prod
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${DB_USER:-workoutuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-workout_tracker}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - workout-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-workoutuser}']
      interval: 10s
      timeout: 5s
      retries: 5
    # Keine Ports nach außen exposen - nur intern erreichbar

  # Backend API
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: workout-tracker-backend-prod
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-workoutuser}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-workout_tracker}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://workout.nikobjelic.com}
    ports:
      - "3001:3001"
    volumes:
      # CSV Dateien für Exercise Migration (read-only)
      - ./data/Exercises.csv:/app/Exercises.csv:ro
      - ./data/Exercises_old.csv:/app/Exercises_old.csv:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - workout-network
    command: >
      sh -c "npx prisma migrate deploy && node dist/main.js"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://workout.nikobjelic.com/api}
    container_name: workout-tracker-frontend-prod
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - workout-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  workout-network:
    driver: bridge

volumes:
  postgres_data_prod:
    driver: local
